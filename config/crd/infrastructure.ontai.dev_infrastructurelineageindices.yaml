---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: infrastructurelineageindices.infrastructure.ontai.dev
spec:
  group: infrastructure.ontai.dev
  names:
    kind: InfrastructureLineageIndex
    listKind: InfrastructureLineageIndexList
    plural: infrastructurelineageindices
    shortNames:
    - ili
    singular: infrastructurelineageindex
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.rootBinding.rootKind
      name: RootKind
      type: string
    - jsonPath: .spec.rootBinding.rootName
      name: RootName
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          InfrastructureLineageIndex is the sealed causal chain index for a root
          declaration in the Seam infrastructure domain. It instantiates the abstract
          DomainLineageIndex schema from core.ontai.dev.

          One InfrastructureLineageIndex is created per root declaration by the
          InfrastructureLineageController. All derived objects carry a reference to their
          root's index; they do not carry their own index instances.
          Lineage Index Pattern — seam-core-schema.md §3.
          Controller-authored exclusively — CLAUDE.md §14 Decision 3.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: InfrastructureLineageIndexSpec is the spec of an InfrastructureLineageIndex.
            properties:
              descendantRegistry:
                description: |-
                  DescendantRegistry is the list of all objects derived from the root
                  declaration. Appended monotonically as new derived objects are created.
                  Entries are never modified or removed.
                items:
                  description: |-
                    DescendantEntry records a single derived object in the lineage index.
                    Entries are appended monotonically. An entry is never modified or removed
                    except by the retention enforcement loop (which removes stale entries after
                    the retention window elapses).
                  properties:
                    creationRationale:
                      allOf:
                      - enum:
                        - ClusterProvision
                        - ClusterDecommission
                        - SecurityEnforcement
                        - PackExecution
                        - VirtualizationFulfillment
                        - ConductorAssignment
                        - VortexBinding
                      - enum:
                        - ClusterProvision
                        - ClusterDecommission
                        - SecurityEnforcement
                        - PackExecution
                        - VirtualizationFulfillment
                        - ConductorAssignment
                        - VortexBinding
                      description: |-
                        CreationRationale is the reason this derived object was created, drawn from
                        the Seam Core controlled vocabulary (pkg/lineage.CreationRationale).
                      type: string
                    group:
                      description: Group is the API group of the derived object (e.g.,
                        platform.ontai.dev).
                      type: string
                    kind:
                      description: Kind is the kind of the derived object.
                      type: string
                    name:
                      description: Name is the name of the derived object.
                      type: string
                    namespace:
                      description: Namespace is the namespace of the derived object.
                      type: string
                    recordedAt:
                      description: |-
                        RecordedAt is the time this descendant entry was appended to the registry.
                        Used by the retention enforcement loop to determine when a stale entry
                        (referenced object no longer exists) has exceeded its retention window.
                      format: date-time
                      type: string
                    rootGenerationAtCreation:
                      description: |-
                        RootGenerationAtCreation is the metadata.generation of the root declaration
                        at the time this derived object was created.
                      format: int64
                      type: integer
                    seamOperator:
                      description: |-
                        SeamOperator is the name of the Seam Operator that created this derived
                        object (e.g., platform, guardian, wrapper, conductor).
                      type: string
                    uid:
                      description: UID is the UID of the derived object.
                      type: string
                    version:
                      description: Version is the API version of the derived object
                        (e.g., v1alpha1).
                      type: string
                  required:
                  - creationRationale
                  - group
                  - kind
                  - name
                  - namespace
                  - rootGenerationAtCreation
                  - seamOperator
                  - uid
                  - version
                  type: object
                type: array
              policyBindingStatus:
                description: |-
                  PolicyBindingStatus records the InfrastructurePolicy and InfrastructureProfile
                  bound to the root declaration at last evaluation.
                properties:
                  domainPolicyRef:
                    description: |-
                      DomainPolicyRef is the name of the InfrastructurePolicy bound to the root
                      declaration.
                    type: string
                  domainProfileRef:
                    description: |-
                      DomainProfileRef is the name of the InfrastructureProfile bound to the
                      root declaration.
                    type: string
                  driftDetected:
                    description: |-
                      DriftDetected is true if the controller detected drift between the expected
                      state derived from the InfrastructurePolicy and the observed state of
                      derived objects at the last evaluation.
                    type: boolean
                  policyGenerationAtLastEvaluation:
                    description: |-
                      PolicyGenerationAtLastEvaluation is the metadata.generation of the bound
                      InfrastructurePolicy at the time of the last policy evaluation cycle.
                    format: int64
                    type: integer
                type: object
              retentionPolicy:
                description: |-
                  RetentionPolicy declares garbage collection behavior for this index and its
                  stale descendant entries. If absent, controller defaults apply
                  (descendantRetentionDays=30, deleteWithRoot=true).
                properties:
                  deleteWithRoot:
                    default: true
                    description: |-
                      DeleteWithRoot controls whether this InfrastructureLineageIndex is garbage
                      collected when its root declaration is deleted. When true the LineageController
                      adds an ownerReference from the index to the root declaration, causing
                      Kubernetes garbage collection to cascade deletion automatically.

                      Defaults to true.
                    type: boolean
                  descendantRetentionDays:
                    default: 30
                    description: |-
                      DescendantRetentionDays is the number of days a stale descendant entry is
                      retained after its referenced object is confirmed not-found in the API server.
                      After this window elapses the LineageController prunes the entry from the
                      DescendantRegistry.

                      Defaults to 30. Minimum is 1.
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              rootBinding:
                description: |-
                  RootBinding records the root declaration that anchors this lineage index.
                  Immutable after admission. The admission webhook rejects any update that
                  modifies a field in this section.
                properties:
                  rootKind:
                    description: RootKind is the kind of the root declaration (e.g.,
                      TalosCluster, PackExecution).
                    type: string
                  rootName:
                    description: RootName is the name of the root declaration.
                    type: string
                  rootNamespace:
                    description: RootNamespace is the namespace of the root declaration.
                    type: string
                  rootObservedGeneration:
                    description: |-
                      RootObservedGeneration is the metadata.generation of the root declaration
                      when this index was created.
                    format: int64
                    type: integer
                  rootUID:
                    description: RootUID is the UID of the root declaration at time
                      of index creation.
                    type: string
                required:
                - rootKind
                - rootName
                - rootNamespace
                - rootObservedGeneration
                - rootUID
                type: object
            required:
            - rootBinding
            type: object
          status:
            description: |-
              InfrastructureLineageIndexStatus is the observed state of an
              InfrastructureLineageIndex.
            properties:
              conditions:
                description: Conditions holds the standard Kubernetes condition array
                  for this resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the last generation of the InfrastructureLineageIndex
                  that the controller has processed.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
